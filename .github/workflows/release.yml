name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to package, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  package:
    name: package
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Validate release version
        env:
          RELEASE_EVENT_NAME: ${{ github.event_name }}
          RELEASE_INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if [ "$RELEASE_EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$RELEASE_INPUT_TAG"
          fi

          case "$tag" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Release tag must look like vMAJOR.MINOR.PATCH: $tag" >&2; exit 1 ;;
          esac

          version="${tag#v}"
          file_version="$(tr -d '[:space:]' < VERSION)"
          pyproject_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          module_version="$(python -c 'from sicario_cli.version import __version__; print(__version__)')"

          if [ "$version" != "$file_version" ] || [ "$version" != "$pyproject_version" ] || [ "$version" != "$module_version" ]; then
            echo "Version mismatch:" >&2
            echo "  tag: $version" >&2
            echo "  VERSION: $file_version" >&2
            echo "  pyproject.toml: $pyproject_version" >&2
            echo "  sicario_cli.version: $module_version" >&2
            exit 1
          fi

          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          expected = Path("VERSION").read_text(encoding="utf-8").strip()

          def yaml_version(path: Path) -> str | None:
              for line in path.read_text(encoding="utf-8").splitlines():
                  stripped = line.strip()
                  if stripped.startswith("version:"):
                      return stripped.split(":", 1)[1].strip().strip("'\"")
              return None

          checked: list[tuple[Path, str | None]] = []
          checked.extend((path, yaml_version(path)) for path in sorted(Path("presets").glob("sicario-*/preset.yml")))
          checked.extend((path, yaml_version(path)) for path in sorted(Path("sicario_cli/assets/presets").glob("sicario-*/preset.yml")))
          checked.append((Path("extensions/sicario-guard/extension.yml"), yaml_version(Path("extensions/sicario-guard/extension.yml"))))
          checked.append((Path("sicario_cli/assets/extensions/sicario-guard/extension.yml"), yaml_version(Path("sicario_cli/assets/extensions/sicario-guard/extension.yml"))))

          for base in (Path("docs/compliance/control-maps"), Path("sicario_cli/assets/control_maps")):
              for path in sorted(base.glob("*.json")):
                  checked.append((path, str(json.loads(path.read_text(encoding="utf-8")).get("version", ""))))

          mismatches = [(path, value) for path, value in checked if value != expected]
          if mismatches:
              print("Release metadata version mismatch:", file=sys.stderr)
              print(f"  expected: {expected}", file=sys.stderr)
              for path, value in mismatches:
                  print(f"  {path}: {value or '<missing>'}", file=sys.stderr)
              raise SystemExit(1)
          PY

          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Build distributions
        run: |
          python -m pip install --require-hashes -r .github/requirements/release-build.txt
          python -m build

      - name: Build Spec Kit release assets
        run: |
          python scripts/build_release_assets.py \
            --catalog-base-url "https://github.com/dfirs1car1o/sicario-spec/releases/download/$RELEASE_TAG"

      - name: Validate Spec Kit release assets
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from zipfile import ZipFile

          version = Path("VERSION").read_text(encoding="utf-8").strip()
          preset_ids = sorted(
              path.parent.name
              for path in Path("presets").glob("sicario-*/preset.yml")
          )
          expected_archives = [f"{preset_id}-{version}.zip" for preset_id in preset_ids]
          expected_archives.extend([
              f"sicario-guard-{version}.zip",
              f"sicario-spec-{version}.zip",
          ])

          missing = [name for name in expected_archives if not (Path("dist") / name).is_file()]
          if missing:
              raise SystemExit(f"Missing release archives: {', '.join(missing)}")

          for preset_id in preset_ids:
              archive = Path("dist") / f"{preset_id}-{version}.zip"
              with ZipFile(archive) as zf:
                  preset = zf.read("preset.yml").decode("utf-8")
              if 'schema_version: "1.0"' not in preset:
                  raise SystemExit(f"{archive} is not a native Spec Kit preset")
              if f'version: "{version}"' not in preset:
                  raise SystemExit(f"{archive} preset.yml does not contain version {version}")

          with ZipFile(Path("dist") / f"sicario-guard-{version}.zip") as zf:
              extension = zf.read("extension.yml").decode("utf-8")
          if 'schema_version: "1.0"' not in extension:
              raise SystemExit("sicario-guard archive is not a native Spec Kit extension")

          with ZipFile(Path("dist") / f"sicario-spec-{version}.zip") as zf:
              bundle = zf.read("bundle.yml").decode("utf-8")
          if 'id: "sicario-spec"' not in bundle:
              raise SystemExit("sicario-spec bundle archive does not contain bundle.yml")

          catalogs = {
              "presets.json": ("presets", preset_ids),
              "extensions.json": ("extensions", ["sicario-guard"]),
              "bundles.json": ("bundles", ["sicario-spec"]),
          }
          for filename, (section, expected_ids) in catalogs.items():
              payload = json.loads((Path("catalogs") / filename).read_text(encoding="utf-8"))
              if payload.get("schema_version") != "1.0":
                  raise SystemExit(f"{filename} has an unexpected schema_version")
              actual_ids = sorted(payload.get(section, {}))
              if actual_ids != sorted(expected_ids):
                  raise SystemExit(f"{filename} contains {actual_ids}, expected {sorted(expected_ids)}")
          PY

      - name: Smoke test Spec Kit bundle install
        env:
          SPEC_KIT_REF: main
        run: |
          python -m pip install "git+https://github.com/github/spec-kit.git@$SPEC_KIT_REF"

          smoke_assets="$(mktemp -d)"
          python scripts/build_release_assets.py \
            --output-dir "$smoke_assets" \
            --catalog-dir "$smoke_assets/catalogs" \
            --catalog-base-url "http://127.0.0.1:8766"

          python -m http.server 8766 --bind 127.0.0.1 --directory "$smoke_assets" \
            >"$RUNNER_TEMP/sicario-bundle-http.log" 2>&1 &
          server_pid="$!"
          cleanup() {
            kill "$server_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          ready=0
          for _ in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8766/catalogs/bundles.json >/dev/null; then
              ready=1
              break
            fi
            sleep 0.5
          done
          if [ "$ready" -ne 1 ]; then
            cat "$RUNNER_TEMP/sicario-bundle-http.log" >&2
            exit 1
          fi

          SPECIFY_BIN=specify PYTHON_BIN=python scripts/smoke_bundle_install.sh \
            http://127.0.0.1:8766/catalogs

      - name: Smoke test wheel
        run: |
          tmpdir="$(mktemp -d)"
          python -m venv "$tmpdir/venv"
          "$tmpdir/venv/bin/pip" install dist/sicario_spec-"$PACKAGE_VERSION"-py3-none-any.whl
          "$tmpdir/venv/bin/sicario" --version
          "$tmpdir/venv/bin/sicario" init "$tmpdir/project" --profile appsec,cloud-iac,security-toolchain,compliance
          "$tmpdir/venv/bin/sicario" verify "$tmpdir/project"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sicario-spec-${{ env.PACKAGE_VERSION }}-dist
          path: |
            dist/*
            catalogs/*.json
          if-no-files-found: error

      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: |
            dist/*
            catalogs/*.json

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; immutable release assets will not be modified."
            gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name'
          else
            gh release create "$RELEASE_TAG" dist/* catalogs/*.json \
              --verify-tag \
              --title "SicarioSpec $RELEASE_TAG" \
              --generate-notes
          fi

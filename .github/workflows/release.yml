name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to package, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  package:
    name: package
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Validate release version
        env:
          RELEASE_EVENT_NAME: ${{ github.event_name }}
          RELEASE_INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if [ "$RELEASE_EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$RELEASE_INPUT_TAG"
          fi

          case "$tag" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Release tag must look like vMAJOR.MINOR.PATCH: $tag" >&2; exit 1 ;;
          esac

          version="${tag#v}"
          file_version="$(tr -d '[:space:]' < VERSION)"
          pyproject_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          module_version="$(python -c 'from sicario_cli.version import __version__; print(__version__)')"

          if [ "$version" != "$file_version" ] || [ "$version" != "$pyproject_version" ] || [ "$version" != "$module_version" ]; then
            echo "Version mismatch:" >&2
            echo "  tag: $version" >&2
            echo "  VERSION: $file_version" >&2
            echo "  pyproject.toml: $pyproject_version" >&2
            echo "  sicario_cli.version: $module_version" >&2
            exit 1
          fi

          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          expected = Path("VERSION").read_text(encoding="utf-8").strip()

          def yaml_version(path: Path) -> str | None:
              for line in path.read_text(encoding="utf-8").splitlines():
                  stripped = line.strip()
                  if stripped.startswith("version:"):
                      return stripped.split(":", 1)[1].strip().strip("'\"")
              return None

          checked: list[tuple[Path, str | None]] = []
          checked.extend((path, yaml_version(path)) for path in sorted(Path("presets").glob("sicario-*/preset.yml")))
          checked.extend((path, yaml_version(path)) for path in sorted(Path("sicario_cli/assets/presets").glob("sicario-*/preset.yml")))
          checked.append((Path("extensions/sicario-guard/extension.yml"), yaml_version(Path("extensions/sicario-guard/extension.yml"))))
          checked.append((Path("sicario_cli/assets/extensions/sicario-guard/extension.yml"), yaml_version(Path("sicario_cli/assets/extensions/sicario-guard/extension.yml"))))

          for base in (Path("docs/compliance/control-maps"), Path("sicario_cli/assets/control_maps")):
              for path in sorted(base.glob("*.json")):
                  checked.append((path, str(json.loads(path.read_text(encoding="utf-8")).get("version", ""))))

          mismatches = [(path, value) for path, value in checked if value != expected]
          if mismatches:
              print("Release metadata version mismatch:", file=sys.stderr)
              print(f"  expected: {expected}", file=sys.stderr)
              for path, value in mismatches:
                  print(f"  {path}: {value or '<missing>'}", file=sys.stderr)
              raise SystemExit(1)
          PY

          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Build distributions
        run: |
          python -m pip install --require-hashes -r .github/requirements/release-build.txt
          python -m build

      - name: Build Spec Kit preset archives
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          version = Path("VERSION").read_text(encoding="utf-8").strip()
          preset_dir = Path("presets/sicario-core")
          archive = Path("dist") / f"sicario-core-{version}.zip"

          with ZipFile(archive, "w", ZIP_DEFLATED) as zf:
              for path in sorted(preset_dir.rglob("*")):
                  if path.is_file():
                      zf.write(path, path.relative_to(preset_dir))
          PY

      - name: Validate Spec Kit preset archive
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          version = Path("VERSION").read_text(encoding="utf-8").strip()
          archive = Path("dist") / f"sicario-core-{version}.zip"
          with ZipFile(archive) as zf:
              preset = zf.read("preset.yml").decode("utf-8")

          expected = f'version: "{version}"'
          if expected not in preset:
              raise SystemExit(
                  f"{archive} preset.yml does not contain {expected!r}"
              )
          PY

      - name: Smoke test wheel
        run: |
          tmpdir="$(mktemp -d)"
          python -m venv "$tmpdir/venv"
          "$tmpdir/venv/bin/pip" install dist/sicario_spec-"$PACKAGE_VERSION"-py3-none-any.whl
          "$tmpdir/venv/bin/sicario" --version
          "$tmpdir/venv/bin/sicario" init "$tmpdir/project" --profile appsec,cloud-iac,security-toolchain,compliance
          "$tmpdir/venv/bin/sicario" verify "$tmpdir/project"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sicario-spec-${{ env.PACKAGE_VERSION }}-dist
          path: dist/*
          if-no-files-found: error

      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: dist/*

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; immutable release assets will not be modified."
            gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name'
          else
            gh release create "$RELEASE_TAG" dist/* \
              --verify-tag \
              --title "SicarioSpec $RELEASE_TAG" \
              --generate-notes
          fi

name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Unit tests
        run: python -m unittest discover -s tests
      - name: Self verify
        run: python -m sicario_cli.cli verify .
      - name: Build and install smoke test
        run: |
          tmpdir="$(mktemp -d)"
          python -m pip wheel . -w "$tmpdir/wheelhouse"
          python -m venv "$tmpdir/venv"
          "$tmpdir/venv/bin/pip" install "$tmpdir"/wheelhouse/sicario_spec-*.whl
          "$tmpdir/venv/bin/sicario" --version
          "$tmpdir/venv/bin/sicario" init "$tmpdir/project" --profile appsec,cloud-iac,security-toolchain,compliance
          "$tmpdir/venv/bin/sicario" verify "$tmpdir/project"

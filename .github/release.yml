changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: Security and governance
      labels:
        - security
        - governance
        - control-map
    - title: Features
      labels:
        - enhancement
        - feature
    - title: Fixes
      labels:
        - bug
    - title: Dependencies
      labels:
        - dependencies
    - title: Documentation
      labels:
        - documentation
    - title: Other changes
      labels:
        - "*"

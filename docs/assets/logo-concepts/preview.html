<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SicarioSpec Logo Concepts</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #05070c;
        color: #f8fafc;
      }
      body {
        margin: 0;
        padding: 40px;
      }
      main {
        margin: 0 auto;
        max-width: 1120px;
      }
      h1 {
        font-size: 32px;
        margin: 0 0 8px;
      }
      p {
        color: #cbd5e1;
        line-height: 1.6;
        margin: 0 0 28px;
      }
      .grid {
        display: grid;
        gap: 20px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }
      article {
        background: #101827;
        border: 1px solid rgba(252, 209, 22, .28);
        border-radius: 8px;
        padding: 22px;
      }
      img {
        display: block;
        height: auto;
        width: 100%;
      }
      h2 {
        font-size: 18px;
        margin: 18px 0 8px;
      }
      code {
        color: #8aa3bd;
        overflow-wrap: anywhere;
      }
      @media (max-width: 820px) {
        body {
          padding: 24px;
        }
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SicarioSpec Logo Concepts</h1>
      <p>Symbolic marks for cutting risk before release. No literal violence, no blood, no human target.</p>
      <section class="grid">
        <article>
          <img src="risk-cut-shield.svg" alt="Risk Cut Shield concept">
          <h2>Risk Cut Shield</h2>
          <code>risk-cut-shield.svg</code>
        </article>
        <article>
          <img src="evidence-s.svg" alt="Evidence S concept">
          <h2>Evidence S</h2>
          <code>evidence-s.svg</code>
        </article>
        <article>
          <img src="approval-gate.svg" alt="Approval Gate concept">
          <h2>Approval Gate</h2>
          <code>approval-gate.svg</code>
        </article>
        <article>
          <img src="canteen.svg" alt="Canteen concept">
          <h2>Canteen</h2>
          <code>canteen.svg</code>
        </article>
        <article>
          <img src="canteen-round.svg" alt="Round Canteen concept">
          <h2>Round Canteen</h2>
          <code>canteen-round.svg</code>
        </article>
      </section>
    </main>
  </body>
</html>

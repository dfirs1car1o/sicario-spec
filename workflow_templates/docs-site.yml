name: docs-site

on:
  pull_request:
    paths:
      - "docs/**"
      - "docs-site/**"
      - ".github/workflows/docs-site.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "docs-site/**"
      - ".github/workflows/docs-site.yml"

permissions:
  contents: read

jobs:
  build:
    name: Docusaurus build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - run: npm ci
      - run: npm run build


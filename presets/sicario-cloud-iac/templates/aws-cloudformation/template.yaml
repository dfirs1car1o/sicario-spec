AWSTemplateFormatVersion: '2010-09-09'
Description: SicarioSpec CloudFormation starter

Parameters:
  Environment:
    Type: String
    Description: Deployment environment
  Owner:
    Type: String
    Description: Required owner tag
  DataClassification:
    Type: String
    Description: Required data-classification tag
    AllowedValues:
      - public
      - internal
      - confidential
      - restricted
      - regulated

Resources: {}

Outputs:
  SicarioIacProfile:
    Value: cloud-iac

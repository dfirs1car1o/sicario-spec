schema_version: "1.0"

preset:
  id: "sicario-supply-chain"
  name: "SicarioSpec Supply Chain"
  version: "0.5.1"
  description: "Build and release integrity profile with SBOM, SCA, provenance, and SLSA-style checks."
  author: "SicarioSpec Contributors"
  repository: "https://github.com/dfirs1car1o/sicario-spec"
  license: "MIT"

requires:
  speckit_version: ">=0.9.0"

provides:
  templates:
    - type: "template"
      name: "checklist-template"
      file: "templates/checklist-template.md"
      description: "Adds Supply Chain review checks for specification, planning, implementation, and verification artifacts."
      strategy: "append"
    - type: "template"
      name: "constitution-template"
      file: "templates/constitution-template.md"
      description: "Adds Supply Chain governance principles to the project constitution."
      strategy: "append"
    - type: "template"
      name: "plan-template"
      file: "templates/plan-template.md"
      description: "Adds Supply Chain architecture, control, verification, and rollout guidance to implementation plans."
      strategy: "append"
    - type: "template"
      name: "spec-template"
      file: "templates/spec-template.md"
      description: "Adds Supply Chain requirements, risks, controls, and evidence expectations to feature specifications."
      strategy: "append"
    - type: "template"
      name: "tasks-template"
      file: "templates/tasks-template.md"
      description: "Adds Supply Chain implementation, test, evidence, and review tasks."
      strategy: "append"

tags:
  - "supply-chain"
  - "sbom"
  - "sca"
  - "slsa"
  - "provenance"

x-sicario:
  extends:
    - "sicario-core"
  focus:
    - "dependency-review"
    - "sbom"
    - "pinned-dependencies"
    - "github-actions-hardening"
    - "provenance"
    - "artifact-signing-readiness"

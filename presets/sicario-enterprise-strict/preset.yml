schema_version: "1.0"

preset:
  id: "sicario-enterprise-strict"
  name: "SicarioSpec Enterprise Strict"
  version: "0.5.1"
  description: "High-assurance enterprise profile for approval, release, and exception governance."
  author: "SicarioSpec Contributors"
  repository: "https://github.com/dfirs1car1o/sicario-spec"
  license: "MIT"

requires:
  speckit_version: ">=0.9.0"

provides:
  templates:
    - type: "template"
      name: "checklist-template"
      file: "templates/checklist-template.md"
      description: "Adds Enterprise Strict review checks for specification, planning, implementation, and verification artifacts."
      strategy: "append"
    - type: "template"
      name: "constitution-template"
      file: "templates/constitution-template.md"
      description: "Adds Enterprise Strict governance principles to the project constitution."
      strategy: "append"
    - type: "template"
      name: "plan-template"
      file: "templates/plan-template.md"
      description: "Adds Enterprise Strict architecture, control, verification, and rollout guidance to implementation plans."
      strategy: "append"
    - type: "template"
      name: "spec-template"
      file: "templates/spec-template.md"
      description: "Adds Enterprise Strict requirements, risks, controls, and evidence expectations to feature specifications."
      strategy: "append"
    - type: "template"
      name: "tasks-template"
      file: "templates/tasks-template.md"
      description: "Adds Enterprise Strict implementation, test, evidence, and review tasks."
      strategy: "append"

tags:
  - "enterprise"
  - "change-control"
  - "codeowners"
  - "release-governance"

x-sicario:
  extends:
    - "sicario-core"
    - "sicario-appsec"
    - "sicario-supply-chain"
    - "sicario-compliance"
  focus:
    - "codeowners"
    - "required-reviewers"
    - "change-control"
    - "production-write-gates"
    - "release-approval"
    - "exception-register"
